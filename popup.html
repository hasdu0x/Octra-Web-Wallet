<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Octra Web Wallet</title>
    <style>
      /* Critical CSS for immediate loading */
      body {
        width: 400px;
        height: 600px;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #f8fafc;
        color: #1e293b;
      }
      
      .dark body {
        background: #0f172a;
        color: #f8fafc;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }
      
      /* Loading state */
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #f8fafc;
        font-size: 14px;
      }
      
      .dark .loading {
        background: #0f172a;
        color: #f8fafc;
      }
      
      /* Basic utility classes for immediate use */
      .min-h-screen { min-height: 100vh; }
      .bg-gradient-to-br { background: linear-gradient(to bottom right, var(--tw-gradient-stops)); }
      .from-slate-50 { --tw-gradient-from: #f8fafc; --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(248, 250, 252, 0)); }
      .to-slate-100 { --tw-gradient-to: #f1f5f9; }
      .dark .from-slate-900 { --tw-gradient-from: #0f172a; }
      .dark .to-slate-800 { --tw-gradient-to: #1e293b; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading">Loading Octra Wallet...</div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
